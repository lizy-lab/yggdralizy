name: Update Yggdralizy State

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, closed]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [update-state]

concurrency:
  group: update-state
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  security-events: read

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[state-update]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run state controller
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/update-state.mjs

      - name: Generate OG image
        id: og
        run: |
          OUTPUT=$(node scripts/generate-og-image.mjs --public)
          echo "$OUTPUT"
          SNAPSHOT=$(echo "$OUTPUT" | grep '^SNAPSHOT:' | cut -d: -f2)
          echo "snapshot=$SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/state.json public/og-image.png public/og-snapshots/
          git diff --cached --quiet || git commit -m "chore: update Yggdralizy state [state-update]"
          git push

      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OG_SNAPSHOT_NAME: ${{ steps.og.outputs.snapshot }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/send-slack.mjs

      - name: Update Slack channel topic
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scripts/update-slack-topic.mjs
